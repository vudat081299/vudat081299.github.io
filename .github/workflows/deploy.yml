name: Deploy site (build Cashy)

# Publishes the whole user-site to GitHub Pages. Static projects are copied
# as-is; Cashy is a Vite app, so it is built and its output is served at /cashy/.
# The web-builder component gallery is a second standalone Vite build, served at
# /cashy-wb/ (separate from the app).
#
# One-time setup: repo Settings → Pages → Build and deployment → Source =
# "GitHub Actions" (instead of "Deploy from a branch").

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: cashy/pnpm-lock.yaml

      - name: Install Cashy deps
        working-directory: cashy
        run: pnpm install --frozen-lockfile

      - name: Build Cashy
        working-directory: cashy
        run: pnpm build

      - name: Build component gallery
        working-directory: cashy
        run: pnpm build:wb

      - name: Assemble site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.claude' \
            --exclude '_site' \
            --exclude 'cashy' \
            ./ _site/
          mkdir -p _site/cashy
          cp -r cashy/dist/. _site/cashy/
          # Component gallery → /cashy-wb/ ; rename its entry so the bare
          # directory URL resolves without /wb.html.
          mkdir -p _site/cashy-wb
          cp -r cashy/dist-wb/. _site/cashy-wb/
          mv _site/cashy-wb/wb.html _site/cashy-wb/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
