/* =========================================================================
   Cashy Web — Design system: "Accent-Tint on dark" (đơn sắc theo vai trò)
   - Màu lưu dạng "R G B" -> nền/viền mờ = rgb(var(--x-rgb) / <alpha>)
   - Một vai trò = một hue: income→green, expense→red, action→blue, info→cyan
   - Nền tint = hue pha loãng (không phải xám). Nền tô đặc -> chữ = var(--bg).
   - Redefine accent cho light theme (bản đậm hơn) để chữ đủ tương phản.
   - No color-mix (vỡ Safari cũ); backdrop-filter kèm -webkit-.
   ========================================================================= */
:root {
  /* ---- fonts ---- */
  --font-body: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  --font-sans: var(--font-body);

  /* ---- radii / spacing ---- */
  --r-sm: 4px; --r-md: 6px; --r-lg: 9px; --r-xl: 12px; --r-full: 9999px; --r-pill: 9999px;
  --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px; --sp-5: 20px; --sp-6: 24px; --sp-8: 32px; --sp-10: 40px;

  /* ---- motion ---- */
  --dur: 200ms; --dur-base: 250ms;
  --ease: cubic-bezier(.16,1,.3,1); --ease-out: cubic-bezier(.16,1,.3,1);
}

/* ================= LIGHT (default · Notion, trung tính ấm) ================= */
:root, [data-theme="light"] {
  color-scheme: light;
  --bg:#ffffff;        --bg-rgb:255 255 255;
  --surface:#f7f6f4;   --surface-rgb:247 246 244;
  --card:#ffffff;      --card-rgb:255 255 255;
  --line:#efeeec;      --line-rgb:239 238 236;
  --border:#e8e7e3;    --border-rgb:232 231 227;

  --text-primary:#37352f; --text-secondary:#73726e; --text-muted:#9b9a97; --text-dim:#b8b7b3;
  --text-primary-rgb:55 53 47;

  --accent-green:#4a8a68;  --accent-green-rgb:74 138 104;
  --accent-cyan:#3a7d8c;   --accent-cyan-rgb:58 125 140;
  --accent-blue:#3878a8;   --accent-blue-rgb:56 120 168;
  --accent-yellow:#b8892b; --accent-yellow-rgb:184 137 43;
  --accent-purple:#8a5cb0; --accent-purple-rgb:138 92 176;
  --accent-red:#c0433c;    --accent-red-rgb:192 67 60;

  --hover: rgba(55,53,47,.055);
  --active: rgba(55,53,47,.09);
  --overlay: rgba(15,15,15,.28);
  --shadow-sm: 0 1px 2px rgba(15,15,15,.04);
  --shadow-md: 0 0 0 1px rgba(15,15,15,.04), 0 4px 12px rgba(15,15,15,.10);
  --shadow-lg: 0 0 0 1px rgba(15,15,15,.05), 0 8px 28px rgba(15,15,15,.16), 0 2px 8px rgba(15,15,15,.08);
  /* action = monochrome; light → nút gần-đen, chữ+icon trắng (như primary của Notion) */
  --action:#37352f;    --action-rgb:55 53 47;  --action-ink:#ffffff;  --action-hover:#2a2925;
  --ring: 0 0 0 3px rgb(var(--action-rgb) / .16);
}

/* ================= DARK (Notion dark) ================= */
[data-theme="dark"] {
  color-scheme: dark;
  --bg:#191919;        --bg-rgb:25 25 25;
  --surface:#202020;   --surface-rgb:32 32 32;
  --card:#242423;      --card-rgb:36 36 35;
  --line:#2d2d2c;      --line-rgb:45 45 44;
  --border:#37373455;  --border-rgb:55 55 52;

  --text-primary:#e9e9e6; --text-secondary:#9b9b98; --text-muted:#7a7a76; --text-dim:#5c5c58;
  --text-primary-rgb:233 233 230;

  --accent-green:#4faf8e;  --accent-green-rgb:79 175 142;
  --accent-cyan:#4aa8bd;   --accent-cyan-rgb:74 168 189;
  --accent-blue:#5a9bd4;   --accent-blue-rgb:90 155 212;
  --accent-yellow:#e0b23f; --accent-yellow-rgb:224 178 63;
  --accent-purple:#b18ad4; --accent-purple-rgb:177 138 212;
  --accent-red:#f0736a;    --accent-red-rgb:240 115 106;

  --hover: rgba(255,255,255,.055);
  --active: rgba(255,255,255,.085);
  --overlay: rgba(0,0,0,.55);
  --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
  --shadow-md: 0 0 0 1px rgba(0,0,0,.2), 0 4px 12px rgba(0,0,0,.4);
  --shadow-lg: 0 0 0 1px rgba(0,0,0,.2), 0 8px 28px rgba(0,0,0,.5), 0 2px 8px rgba(0,0,0,.4);
  /* action = monochrome; dark → nút trắng, chữ+icon gần-đen */
  --action:#e9e9e6;    --action-rgb:233 233 230;  --action-ink:#191919;  --action-hover:#ffffff;
  --ring: 0 0 0 3px rgb(var(--action-rgb) / .28);
}

/* ---- legacy aliases (giữ inline styles trong JS chạy đúng, tự theo theme) ---- */
:root {
  --bg-elev: var(--card);
  --bg-sidebar: var(--surface);
  --bg-inset: var(--surface);
  --bg-hover: var(--hover);
  --bg-active: var(--active);
  --border-strong: var(--border);
  --text: var(--text-primary);
  --text-2: var(--text-secondary);
  --text-3: var(--text-muted);
  --accent: var(--accent-blue);
  --accent-soft: rgb(var(--accent-blue-rgb) / .15);
  --income: var(--accent-green);
  --income-soft: rgb(var(--accent-green-rgb) / .15);
  --expense: var(--accent-red);
  --expense-soft: rgb(var(--accent-red-rgb) / .15);
  --amber: var(--accent-yellow);
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; scroll-behavior: auto !important; }
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text-primary);
  font-size: 15px; line-height: 1.55;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
  font-feature-settings: "ss01" 1, "cv01" 1;
}
button, input, textarea, select { font: inherit; color: inherit; }
button { cursor: pointer; background: none; border: none; }
a { color: var(--text-primary); text-decoration: underline; text-underline-offset: 2px; text-decoration-color: var(--text-dim); }
::selection { background: rgb(var(--action-rgb) / .20); color: var(--text-primary); }

/* money & digits -> mono tabular (fintech feel) */
.num, .mono, .kpi__value, .tx__amount, .txgroup__sum, .amount-input input,
.legend__val, .legend__pct, .nav__count {
  font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1;
}

/* uppercase mono eyebrow labels */
.kpi__label, .nav__label, .dropdown__label {
  font-family: var(--font-body); text-transform: none; letter-spacing: normal;
}

/* scrollbars */
* { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; border: 3px solid transparent; background-clip: content-box; }
*::-webkit-scrollbar-thumb:hover { background: var(--text-dim); background-clip: content-box; }

/* =========================================================================
   Layout
   ========================================================================= */
.layout { display: flex; height: 100vh; height: 100dvh; overflow: hidden; }

.sidebar {
  width: 250px; flex: 0 0 250px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: transform var(--dur) var(--ease);
  z-index: 40;
}
.sidebar__head { padding: var(--sp-3) var(--sp-3) var(--sp-2); position: relative; }
.workspace { display: flex; align-items: center; gap: 10px; width: 100%; padding: 8px; border-radius: var(--r-md); transition: background var(--dur); }
.workspace:hover { background: var(--hover); }
.workspace__avatar { width: 32px; height: 32px; border-radius: 9px; flex: 0 0 32px; display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 14px; }
.workspace__meta { min-width: 0; flex: 1; text-align: left; }
.workspace__name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.workspace__sub { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.workspace__chev { color: var(--text-dim); flex: 0 0 auto; }

.nav { padding: var(--sp-2); flex: 1; overflow-y: auto; }
.nav__label { font-size: 10.5px; font-weight: 600; color: var(--text-dim); padding: 12px 8px 4px; }
.nav__item {
  display: flex; align-items: center; gap: 11px; width: 100%;
  padding: 8px; border-radius: var(--r-md);
  color: var(--text-secondary); font-size: 14px; font-weight: 500; text-align: left;
  transition: background var(--dur), color var(--dur); position: relative;
}
.nav__item:hover { background: var(--hover); color: var(--text-primary); }
.nav__item svg { flex: 0 0 18px; color: var(--text-dim); transition: color var(--dur); }
.nav__item:hover svg { color: var(--text-secondary); }
.nav__item.is-active { background: var(--active); color: var(--text-primary); font-weight: 600; }
.nav__item.is-active svg { color: var(--text-primary); }
.nav__count { margin-left: auto; font-size: 11px; color: var(--text-dim); background: var(--active); padding: 1px 7px; border-radius: var(--r-pill); }
.nav__item.is-active .nav__count { color: var(--action-ink); background: var(--action); }

.sidebar__foot { padding: var(--sp-2); border-top: 1px solid var(--border); display: flex; gap: 6px; align-items: center; }
.sidebar__foot span { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .06em; color: var(--text-dim); margin-left: 4px; }

.main { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
.topbar {
  height: 54px; flex: 0 0 54px; display: flex; align-items: center; gap: 12px;
  padding: 0 var(--sp-5); border-bottom: 1px solid var(--border);
  background: rgb(var(--bg-rgb) / .78);
  -webkit-backdrop-filter: saturate(140%) blur(10px); backdrop-filter: saturate(140%) blur(10px);
}
.topbar__title { font-size: 14px; font-weight: 600; letter-spacing: -.01em; }
.topbar__spacer { flex: 1; }
.icon-btn { display: grid; place-items: center; width: 32px; height: 32px; border-radius: var(--r-md); color: var(--text-muted); transition: background var(--dur), color var(--dur); }
.icon-btn:hover { background: var(--hover); color: var(--text-primary); }
.menu-btn { display: none; }

.content { flex: 1; overflow-y: auto; overflow-x: hidden; }
.page { max-width: 1080px; margin: 0 auto; padding: var(--sp-8) var(--sp-6) 120px; }
.page--wide { max-width: 1200px; }
.page__header { display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap; margin-bottom: var(--sp-6); }
.page__title { font-size: 27px; font-weight: 700; letter-spacing: -.025em; }
.page__subtitle { color: var(--text-muted); font-size: 13.5px; margin-top: 4px; }
.page__actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }

/* =========================================================================
   Buttons & controls
   ========================================================================= */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;

}

/* ---------------------------------------------------------------- money (VND, integer — Decimal-safe, never float) */
const Money = {
  format(n) { return new Intl.NumberFormat('vi-VN').format(Math.round(n || 0)) + ' đ'; },
  formatShort(n) {
    n = Math.round(n || 0); const a = Math.abs(n);
    const s = a >= 1e9 ? (n / 1e9).toFixed(a % 1e9 === 0 ? 0 : 1) + ' tỷ'
      : a >= 1e6 ? (n / 1e6).toFixed(a % 1e6 === 0 ? 0 : 1) + ' tr'
      : a >= 1e3 ? (n / 1e3).toFixed(0) + 'k' : String(n);
    return s + ' đ';
  },
  grouped(n) { return new Intl.NumberFormat('vi-VN').format(Math.round(n || 0)); },
  parse(str) { const d = String(str).replace(/[^\d]/g, ''); return d ? parseInt(d, 10) : 0; },
  signed(n, type) { const v = Money.format(n); return type === 'income' ? '+' + v : '-' + v; },
};

/* ---------------------------------------------------------------- dates */
const DAY = 86400000;
function pad(n) { return String(n).padStart(2, '0'); }
function ymd(d) { return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()); }
function todayYMD() { return ymd(new Date()); }
function parseYMD(s) { const [y, m, d] = s.split('-').map(Number); return new Date(y, m - 1, d); }
function addDays(s, n) { const d = parseYMD(s); d.setDate(d.getDate() + n); return ymd(d); }
const VN_MONTHS = ['thg 1','thg 2','thg 3','thg 4','thg 5','thg 6','thg 7','thg 8','thg 9','thg 10','thg 11','thg 12'];
const VN_WD = ['CN','T2','T3','T4','T5','T6','T7'];
function fmtDate(s) { const d = parseYMD(s); return d.getDate() + ' ' + VN_MONTHS[d.getMonth()] + ', ' + d.getFullYear(); }
function fmtDateShort(s) { const d = parseYMD(s); return pad(d.getDate()) + '/' + pad(d.getMonth() + 1) + '/' + d.getFullYear(); }
function relativeDateHead(s) {
  const t = todayYMD();
  if (s === t) return 'Hôm nay';
  if (s === addDays(t, -1)) return 'Hôm qua';
  const d = parseYMD(s);
  return VN_WD[d.getDay()] + ', ' + fmtDate(s);
}

// period presets -> { start (inclusive ymd), end (exclusive ymd), label }
function periodRange(preset, custom) {
  const now = new Date(); const y = now.getFullYear(), m = now.getMonth();
  const startNext = () => ymd(new Date(y, m + 1, 1));
  switch (preset) {
    case 'thisMonth': return { start: ymd(new Date(y, m, 1)), end: startNext(), label: 'Tháng này' };
    case 'lastMonth': return { start: ymd(new Date(y, m - 1, 1)), end: ymd(new Date(y, m, 1)), label: 'Tháng trước' };
    case 'last30': return { start: addDays(todayYMD(), -29), end: addDays(todayYMD(), 1), label: '30 ngày qua' };
    case 'thisQuarter': { const q = Math.floor(m / 3) * 3; return { start: ymd(new Date(y, q, 1)), end: ymd(new Date(y, q + 3, 1)), label: 'Quý này' }; }
    case 'thisYear': return { start: ymd(new Date(y, 0, 1)), end: ymd(new Date(y + 1, 0, 1)), label: 'Năm nay' };
    case 'all': return { start: '0000-01-01', end: '9999-12-31', label: 'Tất cả' };
    case 'custom': return { start: custom?.start || todayYMD(), end: addDays(custom?.end || todayYMD(), 1), label: 'Tùy chỉnh', rawEnd: custom?.end };
    default: return periodRange('thisMonth');
  }
}
function prevRange(r) {
  if (r.start === '0000-01-01') return null;
  const s = parseYMD(r.start), e = parseYMD(r.end);
  const len = Math.round((e - s) / DAY);
  return { start: ymd(new Date(s.getTime() - len * DAY)), end: r.start };
}

/* ================================================================= STORE */
// Single localStorage key holds everything (small data volumes for v1).
const KEY = 'cashy_state_v1';
const PENDING_NAME = 'Chưa phân loại';

const Store = {
  state: null,

  load() {
    try { this.state = JSON.parse(localStorage.getItem(KEY)) || null; }
    catch (e) { this.state = null; }
    if (!this.state) this.state = { users: [], activeUserId: null, theme: 'light', data: {} };
    if (!this.state.data) this.state.data = {};
    return this.state;
  },
  persist() { localStorage.setItem(KEY, JSON.stringify(this.state)); },

  // theme
  getTheme() { return this.state.theme || 'system'; },
  setTheme(t) { this.state.theme = t; this.persist(); applyTheme(); },

  // users
  users() { return this.state.users; },
  activeUser() { return this.state.users.find(u => u.id === this.state.activeUserId) || null; },
  createUser(name) {
    const colors = ['#e0483d','#d9730d','#cb8a14','#1a8f6b','#2383e2','#6940a5','#ad1a72','#64473a'];
    const u = { id: uid(), displayName: name.trim(), currency: 'VND',
      avatarColor: colors[this.state.users.length % colors.length], createdAt: new Date().toISOString() };
    this.state.users.push(u);
    this.state.data[u.id] = { categories: seedCategories(), transactions: [] };
    this.state.activeUserId = u.id;
    this.persist();
    return u;
  },
  switchUser(id) { this.state.activeUserId = id; this.persist(); },
  logout() { this.state.activeUserId = null; this.persist(); },
  updateUser(patch) { Object.assign(this.activeUser(), patch); this.persist(); },
  deleteUser(id) {
    this.state.users = this.state.users.filter(u => u.id !== id);
    delete this.state.data[id];
    if (this.state.activeUserId === id) this.state.activeUserId = null;
    this.persist();
  },

  data() { return this.state.data[this.state.activeUserId]; },

  // categories
  categories() { return this.data().categories; },
  category(id) { return this.categories().find(c => c.id === id); },
  pendingCategory() { return this.categories().find(c => c.isSystem && c.name === PENDING_NAME); },
  addCategory(cat) { const c = { id: uid(), isSystem: false, ...cat }; this.data().categories.push(c); this.persist(); return c; },
  updateCategory(id, patch) { Object.assign(this.category(id), patch); this.persist(); },
  deleteCategory(id) {
    const cat = this.category(id);
    if (!cat || cat.isSystem) return false;
    // cascade: collect id + all descendants
    const toDelete = new Set([id]);
    let changed = true;
    while (changed) {
      changed = false;
      for (const c of this.categories()) if (c.parentId && toDelete.has(c.parentId) && !toDelete.has(c.id)) { toDelete.add(c.id); changed = true; }
    }
    this.data().categories = this.categories().filter(c => !toDelete.has(c.id));
    // orphan fallback -> Pending (invariant: every tx has >=1 category)
    const pid = this.pendingCategory().id;
    for (const t of this.transactions()) {
      t.categoryIds = t.categoryIds.filter(cid => !toDelete.has(cid));
      if (t.categoryIds.length === 0) t.categoryIds = [pid];
    }
    this.persist();
    return true;
  },

  // transactions
  transactions() { return this.data().transactions; },
  transaction(id) { return this.transactions().find(t => t.id === id); },
  saveTransaction(tx) {
    // enforce invariant: >= 1 category, fallback Pending
    let cats = (tx.categoryIds || []).filter(id => this.category(id));
    if (cats.length === 0) cats = [this.pendingCategory().id];
    if (tx.id) {
      const t = this.transaction(tx.id);
      Object.assign(t, { type: tx.type, amount: tx.amount, occurredAt: tx.occurredAt, note: tx.note, categoryIds: cats });
    } else {
      this.transactions().push({ id: uid(), type: tx.type, amount: tx.amount, occurredAt: tx.occurredAt, note: tx.note || '', categoryIds: cats, createdAt: new Date().toISOString() });
    }
    this.persist();
  },
  deleteTransaction(id) { this.data().transactions = this.transactions().filter(t => t.id !== id); this.persist(); },
};

/* =============================================================== DOMAIN */
const Domain = {
  // build ordered flat list with depth, parents first (tree order)
  orderedCategories(type = null) {
    const all = Store.categories();
    const roots = all.filter(c => !c.parentId);
    const out = [];
    const walk = (c, depth) => {
      out.push({ cat: c, depth });
      all.filter(x => x.parentId === c.id).sort(byName).forEach(ch => walk(ch, depth + 1));
    };
    roots.sort((a, b) => (a.isSystem ? 1 : 0) - (b.isSystem ? 1 : 0) || byName(a, b)).forEach(r => walk(r, 0));
    return type ? out.filter(o => o.cat.type === type || o.cat.isSystem) : out;
  },
  descendantIds(id) {
    const all = Store.categories(); const set = new Set([id]); let changed = true;
    while (changed) { changed = false; for (const c of all) if (c.parentId && set.has(c.parentId) && !set.has(c.id)) { set.add(c.id); changed = true; } }
    return set;
  },
  rootOf(id) { let c = Store.category(id); while (c && c.parentId) c = Store.category(c.parentId); return c; },

  // filter transactions -> array
  filter(opts) {
    const { period, custom, type, categoryIds, rollup, search, sort } = opts;
    const r = periodRange(period, custom);
    let expand = new Set();
    if (categoryIds && categoryIds.length) {
      categoryIds.forEach(id => { if (rollup) Domain.descendantIds(id).forEach(x => expand.add(x)); else expand.add(id); });
    }
    const q = (search || '').trim().toLowerCase();
    let list = Store.transactions().filter(t => {
      if (t.occurredAt < r.start || t.occurredAt >= r.end) return false;
      if (type && type !== 'all' && t.type !== type) return false;
      if (expand.size && !t.categoryIds.some(id => expand.has(id))) return false;
      if (q) {
        const cats = t.categoryIds.map(id => (Store.category(id)?.name || '')).join(' ').toLowerCase();
        if (!(t.note || '').toLowerCase().includes(q) && !cats.includes(q) && !String(t.amount).includes(q)) return false;
      }
      return true;
    });
    const cmp = {
      'date-desc': (a, b) => b.occurredAt.localeCompare(a.occurredAt) || (b.createdAt || '').localeCompare(a.createdAt || ''),
      'date-asc': (a, b) => a.occurredAt.localeCompare(b.occurredAt),
      'amount-desc': (a, b) => b.amount - a.amount,
      'amount-asc': (a, b) => a.amount - b.amount,
    }[sort || 'date-desc'];
    return list.sort(cmp);
  },

  totals(list) {
    let income = 0, expense = 0;
    for (const t of list) { if (t.type === 'income') income += t.amount; else expense += t.amount; }
    return { income, expense, net: income - expense, count: list.length };
  },
  balanceAllTime() { return Domain.totals(Store.transactions()).net; },

  // breakdown by ROOT category (attribute each tx to first category's root -> clean part-to-whole)
  breakdown(list, type) {
    const map = new Map();
    for (const t of list) {
      if (t.type !== type) continue;
      const root = Domain.rootOf(t.categoryIds[0]) || Store.pendingCategory();
      const e = map.get(root.id) || { cat: root, value: 0, count: 0 };
      e.value += t.amount; e.count++; map.set(root.id, e);
    }
    return [...map.values()].sort((a, b) => b.value - a.value);
  },

  // time buckets for chart: by day if <= 62 days else by month
  timeSeries(list, range) {
    const start = parseYMD(range.start === '0000-01-01' ? (list.reduce((m, t) => t.occurredAt < m ? t.occurredAt : m, todayYMD())) : range.start);
    const end = range.end === '9999-12-31' ? new Date() : parseYMD(range.end);
    const days = clamp(Math.round((end - start) / DAY), 1, 3660);
    const byMonth = days > 62;
    const buckets = new Map();
    const keyOf = (s) => byMonth ? s.slice(0, 7) : s;
    for (const t of list) { const k = keyOf(t.occurredAt); const b = buckets.get(k) || { income: 0, expense: 0 }; b[t.type] += t.amount; buckets.set(k, b); }
    // build ordered keys
    const keys = [];
    if (byMonth) { let d = new Date(start.getFullYear(), start.getMonth(), 1); while (d <= end && keys.length < 24) { keys.push(ymd(d).slice(0, 7)); d.setMonth(d.getMonth() + 1); } }
    else { let d = new Date(start); while (d < end && keys.length < 62) { keys.push(ymd(d)); d.setDate(d.getDate() + 1); } }
    return keys.map(k => ({ key: k, label: byMonth ? ('T' + Number(k.slice(5, 7))) : String(Number(k.slice(8, 10))), ...(buckets.get(k) || { income: 0, expense: 0 }) }));
  },
};
function byName(a, b) { return a.name.localeCompare(b.name, 'vi'); }

/* ================================================================= THEME */
function applyTheme() {
  const t = Store.getTheme();
  const resolved = t === 'system' ? (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : t;
  document.documentElement.setAttribute('data-theme', resolved);
  const meta = document.querySelector('meta[name=theme-color]');
  if (meta) meta.content = resolved === 'dark' ? '#1a1a1a' : '#ffffff';
}
matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => { if (Store.getTheme() === 'system') applyTheme(); });

/* ================================================================= TOAST */
function toast(msg, tone) {
  const el = h(`<div class="toast ${tone === 'danger' ? 'toast--danger' : ''}">${esc(msg)}</div>`);
  $('#toasts').appendChild(el);
  setTimeout(() => { el.style.transition = 'opacity .2s, transform .2s'; el.style.opacity = '0'; el.style.transform = 'translateY(6px)'; setTimeout(() => el.remove(), 220); }, 2200);
}

/* ================================================================= MODAL */
function openModal(node, opts = {}) {
  const overlay = h('<div class="overlay"></div>');
  overlay.appendChild(node);
  overlay.addEventListener('mousedown', (e) => { if (e.target === overlay && !opts.persistent) close(); });
  function onKey(e) { if (e.key === 'Escape') close(); }
  function close() { document.removeEventListener('keydown', onKey); overlay.style.animation = 'fade .15s reverse'; setTimeout(() => overlay.remove(), 130); opts.onClose && opts.onClose(); }
  document.addEventListener('keydown', onKey);
  document.body.appendChild(overlay);
  overlay._close = close;
  const inp = node.querySelector('input,textarea,select'); if (inp && opts.autofocus !== false) setTimeout(() => inp.focus(), 40);
  return { close, overlay };
}
function confirmDialog({ title, message, confirmText = 'Xác nhận', danger }) {
  return new Promise((resolve) => {
    const node = h(`<div class="modal" style="max-width:400px">
      <div class="modal__body">
        <div style="font-size:16px;font-weight:600">${esc(title)}</div>
        <div style="color:var(--text-2);font-size:14px;line-height:1.55">${esc(message)}</div>
      </div>
      <div class="modal__foot">
        <button class="btn btn--ghost" data-act="cancel">Hủy</button>
        <button class="btn ${danger ? 'btn--danger' : 'btn--primary'}" data-act="ok">${esc(confirmText)}</button>
      </div>
    </div>`);
    const m = openModal(node);
    node.querySelector('[data-act=cancel]').onclick = () => { m.close(); resolve(false); };
    node.querySelector('[data-act=ok]').onclick = () => { m.close(); resolve(true); };
  });
}

/* ============================================================ dropdown */
function attachDropdown(triggerBtn, buildContent, opts = {}) {
  let dd = null;
  function open() {
    close();
    dd = h(`<div class="dropdown ${opts.right ? 'dropdown--right' : ''}"></div>`);
    buildContent(dd, close);
    triggerBtn.parentElement.appendChild(dd);
    setTimeout(() => document.addEventListener('mousedown', outside), 0);
  }
  function outside(e) { if (dd && !dd.contains(e.target) && e.target !== triggerBtn && !triggerBtn.contains(e.target)) close(); }
  function close() { if (dd) { dd.remove(); dd = null; document.removeEventListener('mousedown', outside); } }
  triggerBtn.addEventListener('click', (e) => { e.stopPropagation(); dd ? close() : open(); });
  return { close };
}

/* =============================================== category chip / avatar */
function catChipHTML(cat, opts = {}) {
  return `<span class="chip" ${opts.attr || ''}><span class="chip__dot" style="background:${cat.colorHex}"></span>${cat.icon} ${esc(cat.name)}</span>`;
}
function tinted(color) { return { bg: color + '22', fg: color }; }

/* =============================================================== ROUTER */
function currentRoute() { return (location.hash.replace('#/', '') || 'dashboard'); }
function navigate(name) { location.hash = '#/' + name; }
window.addEventListener('hashchange', renderApp);

let sidebarOpen = false;

function renderApp() {
  applyTheme();
  const app = $('#app');
  const NS = window.__cashy;
  if (!Store.activeUser()) { app.innerHTML = ''; app.appendChild(NS.OnboardingView()); return; }
  const rname = currentRoute();
  const render = NS.routes[rname] || NS.routes.dashboard;

  app.innerHTML = '';
  const layout = h(`<div class="layout"></div>`);
  layout.appendChild(Sidebar(rname));
  if (sidebarOpen && innerWidth <= 720) {
    const scrim = h('<div class="sidebar-scrim"></div>');
    scrim.onclick = () => { sidebarOpen = false; renderApp(); };
    layout.appendChild(scrim);
  }
  const main = h(`<div class="main"></div>`);
  const meta = NAV.find(n => n.id === rname) || NAV[0];
  const topbar = h(`<div class="topbar">
      <button class="icon-btn menu-btn" title="Menu">${I.menu}</button>
      <div class="topbar__title">${esc(meta.title)}</div>
      <div class="topbar__spacer"></div>
    </div>`);
  topbar.querySelector('.menu-btn').onclick = () => { sidebarOpen = !sidebarOpen; renderApp(); };
  const quick = h(`<button class="btn btn--primary btn--sm">${I.plus}<span>Thêm giao dịch</span></button>`);
  quick.onclick = () => NS.openTxModal();
  topbar.appendChild(quick);
  main.appendChild(topbar);
  const content = h(`<div class="content"></div>`);
  content.appendChild(render());
  main.appendChild(content);
  layout.appendChild(main);
  app.appendChild(layout);

  // FAB (mobile)
  const fab = h(`<button class="fab" title="Thêm giao dịch (n)">${I.plus}</button>`);
  fab.onclick = () => NS.openTxModal();
  app.appendChild(fab);
}

const NAV = [
  { id: 'dashboard', title: 'Tổng quan', icon: I.dashboard },
  { id: 'transactions', title: 'Giao dịch', icon: I.list },
  { id: 'categories', title: 'Danh mục', icon: I.tags },
  { id: 'settings', title: 'Cài đặt', icon: I.settings },
];

function Sidebar(active) {
  const u = Store.activeUser();
  const el = h(`<aside class="sidebar ${sidebarOpen ? 'is-open' : ''}">
    <div class="sidebar__head">
      <button class="workspace" title="Tài khoản">
        <span class="workspace__avatar" style="background:${u.avatarColor}">${esc((u.displayName[0] || 'C').toUpperCase())}</span>
        <span class="workspace__meta">
          <span class="workspace__name">${esc(u.displayName)}</span>
          <span class="workspace__sub">Cashy · VND</span>
        </span>
        <span class="workspace__chev">${I.chevDown}</span>
      </button>
    </div>
    <nav class="nav"></nav>
    <div class="sidebar__foot">
      <button class="icon-btn" data-theme-toggle title="Đổi giao diện"></button>
      <span style="font-size:12px;color:var(--text-3);margin-left:4px">Cashy v1 · web</span>
    </div>
  </aside>`);

  const nav = el.querySelector('.nav');
  const txCount = Store.transactions().length;
  NAV.forEach(item => {
    const btn = h(`<button class="nav__item ${item.id === active ? 'is-active' : ''}">${item.icon}<span>${esc(item.title)}</span>${item.id === 'transactions' && txCount ? `<span class="nav__count">${txCount}</span>` : ''}</button>`);
    btn.onclick = () => { sidebarOpen = false; navigate(item.id); };
    nav.appendChild(btn);
  });

  // theme toggle button
  const tt = el.querySelector('[data-theme-toggle]');
  const resolved = document.documentElement.getAttribute('data-theme');
  tt.innerHTML = resolved === 'dark' ? I.sun : I.moon;
  tt.onclick = () => { Store.setTheme(resolved === 'dark' ? 'light' : 'dark'); renderApp(); };

  // workspace menu
  attachDropdown(el.querySelector('.workspace'), (dd, close) => {
    dd.style.left = '12px'; dd.style.top = '56px'; dd.style.minWidth = '220px';
    dd.appendChild(h(`<div class="dropdown__label">Tài khoản trên máy này</div>`));
    Store.users().forEach(user => {
      const row = h(`<button class="dropdown__item ${user.id === u.id ? 'is-active' : ''}">
        <span class="workspace__avatar" style="width:24px;height:24px;font-size:12px;border-radius:6px;background:${user.avatarColor}">${esc((user.displayName[0]||'C').toUpperCase())}</span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(user.displayName)}</span>
        ${user.id === u.id ? I.check : ''}</button>`);
      row.onclick = () => { Store.switchUser(user.id); close(); renderApp(); };
      dd.appendChild(row);
    });
    dd.appendChild(h('<div class="dropdown__sep"></div>'));
    const add = h(`<button class="dropdown__item">${I.plus} Thêm tài khoản</button>`);
    add.onclick = () => { close(); Store.logout(); renderApp(); };
    dd.appendChild(add);
    const out = h(`<button class="dropdown__item" style="color:var(--text-2)">${I.wallet} Đăng xuất</button>`);
    out.onclick = () => { close(); Store.logout(); renderApp(); };
    dd.appendChild(out);
  });

  return el;
}

/* boot */
Store.load();
applyTheme();
window.addEventListener('keydown', (e) => {
  if ((e.key === 'n' || e.key === 'N') && Store.activeUser() && !/input|textarea|select/i.test(document.activeElement.tagName) && !document.querySelector('.overlay')) {
    e.preventDefault(); window.__cashy.openTxModal();
  }
});

// expose for later view modules attached below
window.__cashy = { Store, Domain, Money, renderApp, navigate, openModal, confirmDialog, attachDropdown, toast, h, frag, esc, uid, I, ymd, todayYMD, fmtDate, fmtDateShort, relativeDateHead, periodRange, prevRange, parseYMD, addDays, byName, catChipHTML, clamp, PENDING_NAME };

/* Views are defined in the second script block for readability. */
})();

<script>
"use strict";
/* =========================================================================
   Cashy Web — Views (dashboard, transactions, categories, settings,
   onboarding) + transaction modal + category modal + charts + pickers.
   ========================================================================= */
(function () {
const C = window.__cashy;
const { Store, Domain, Money, renderApp, navigate, openModal, confirmDialog, attachDropdown, toast, h, esc, uid, I, ymd, todayYMD, fmtDate, fmtDateShort, relativeDateHead, periodRange, prevRange, parseYMD, byName, clamp, PENDING_NAME } = C;
const $ = (s, r = document) => r.querySelector(s);

/* ------------------------------------------------------------- charts */
function donutSVG(segments, size = 150) {
  const stroke = 22, r = (size - stroke) / 2, cx = size / 2, C2 = 2 * Math.PI * r;
  const total = segments.reduce((s, x) => s + x.value, 0) || 1;
  let acc = 0;
  const arcs = segments.map(s => {
    const len = s.value / total * C2;
    const el = `<circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${stroke}" stroke-dasharray="${len} ${C2 - len}" stroke-dashoffset="${-acc}" transform="rotate(-90 ${cx} ${cx})" stroke-linecap="butt"/>`;
    acc += len; return el;
  }).join('');
  const track = `<circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="var(--bg-inset)" stroke-width="${stroke}"/>`;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${track}${arcs}</svg>`;
}

function barsChart(series, height = 180) {
  if (!series.length) return '<div class="empty" style="padding:30px">Chưa có dữ liệu</div>';
  const max = Math.max(1, ...series.map(s => Math.max(s.income, s.expense)));
  const cols = series.map(s => {
    const ih = Math.round(s.income / max * (height - 24));
    const eh = Math.round(s.expense / max * (height - 24));
    return `<div class="bars__col" title="${s.label}: +${Money.formatShort(s.income)} / -${Money.formatShort(s.expense)}">
      <div class="bars__stack" style="height:${height - 24}px;flex-direction:row;gap:3px;align-items:flex-end">
        <div class="bars__bar" style="height:${ih}px;background:var(--income);flex:1"></div>
        <div class="bars__bar" style="height:${eh}px;background:var(--expense);flex:1"></div>
      </div>
      <div class="bars__label">${esc(s.label)}</div>
    </div>`;
  }).join('');
  return `<div class="bars" style="height:${height}px">${cols}</div>`;
}

/* ============================================================ ONBOARDING */
function OnboardingView() {
  const users = Store.users();
  const el = h(`<div class="onboard"><div class="onboard__card">
    <div class="onboard__logo">${I.logo}</div>
    <h1>Chào mừng đến Cashy</h1>
    <div class="onboard__tag">Quản lý &amp; thống kê chi tiêu cá nhân. Dữ liệu ở ngay trên máy bạn — không gửi đi đâu.</div>
    <form class="onboard__form">
      <div class="field">
        <label class="field__label">Tên của bạn</label>
        <input class="input" name="name" placeholder="VD: Đạt" autocomplete="off" maxlength="40" style="height:44px" />
        <span class="field__hint">Chỉ cần một cái tên là bắt đầu được. Có thể đổi trong Cài đặt.</span>
      </div>
      <button class="btn btn--primary" type="submit" style="height:44px">Tạo tài khoản &amp; bắt đầu</button>
    </form>
    <div class="onboard__accounts"></div>
  </div></div>`);

  const form = el.querySelector('form');
  const nameInput = form.querySelector('input[name="name"]');
  const submitOnboarding = (e) => {
    if (e) e.preventDefault();
    const name = nameInput.value.trim();
    if (!name) { nameInput.focus(); toast('Nhập tên của bạn để bắt đầu nhé', 'danger'); return; }
    Store.createUser(name);
    navigate('dashboard'); renderApp();
    toast('Đã tạo tài khoản. Chào ' + name + '! 👋');
  };
  form.onsubmit = submitOnboarding;

  const acc = el.querySelector('.onboard__accounts');
  if (users.length) {
    acc.appendChild(h(`<div class="field__label" style="margin-bottom:2px">Hoặc tiếp tục với tài khoản đã có</div>`));
    users.forEach(u => {
      const row = h(`<button type="button" class="account-row">
        <span class="workspace__avatar" style="background:${u.avatarColor}">${esc((u.displayName[0]||'C').toUpperCase())}</span>
        <span style="flex:1;text-align:left"><div style="font-weight:600">${esc(u.displayName)}</div>
        <div style="font-size:12px;color:var(--text-3)">${Store.state.data[u.id]?.transactions.length || 0} giao dịch</div></span>
        ${I.chevRight}</button>`);
      row.onclick = () => { Store.switchUser(u.id); navigate('dashboard'); renderApp(); };
      acc.appendChild(row);
    });
  }
  return el;
}

/* ============================================================= DASHBOARD */
const dashState = { period: 'thisMonth', custom: { start: todayYMD(), end: todayYMD() } };

function DashboardView() {
  const page = h(`<div class="page page--wide"></div>`);
  const range = periodRange(dashState.period, dashState.custom);
  const list = Domain.filter({ period: dashState.period, custom: dashState.custom, type: 'all', sort: 'date-desc' });
  const t = Domain.totals(list);
  const balance = Domain.balanceAllTime();

  // header
  const header = h(`<div class="page__header">
    <div><div class="page__title">Tổng quan</div><div class="page__subtitle">${esc(range.label)}${range.rawEnd ? '' : ''} · ${t.count} giao dịch</div></div>
    <div class="page__actions"></div>
  </div>`);
  header.querySelector('.page__actions').appendChild(periodPicker(dashState.period, dashState.custom, () => renderInto()));
  page.appendChild(header);

  // KPIs
  const prev = prevRange(range);
  const prevList = prev ? Store.transactions().filter(x => x.occurredAt >= prev.start && x.occurredAt < prev.end) : [];
  const pt = Domain.totals(prevList);
  const delta = (cur, old) => { if (!old || old <= 0) return null; return Math.round((cur - old) / old * 100); };
  const kpis = h(`<div class="kpis">
    ${kpiCard('Số dư (tất cả)', Money.format(balance), null, balance >= 0 ? 'up' : 'down', I.wallet)}
    ${kpiCard('Thu nhập', Money.format(t.income), delta(t.income, pt.income), 'income')}
    ${kpiCard('Chi tiêu', Money.format(t.expense), delta(t.expense, pt.expense), 'expense', null, true)}
    ${kpiCard('Chênh lệch kỳ này', (t.net >= 0 ? '+' : '') + Money.format(t.net), delta(t.net, pt.net), t.net >= 0 ? 'up' : 'down')}
  </div>`);
  page.appendChild(kpis);

  // charts row
  const grid = h(`<div class="grid-2"></div>`);
  // trend bars
  const series = Domain.timeSeries(list, range);
  const trend = h(`<div class="card card--pad">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
      <div><div class="section-title">Thu / Chi theo thời gian</div><div class="section-sub">Xanh: thu nhập · Đỏ: chi tiêu</div></div>
    </div></div>`);
  trend.appendChild(h(barsChart(series)));
  grid.appendChild(trend);

  // expense donut
  const bd = Domain.breakdown(list, 'expense');
  const segs = bd.slice(0, 6).map(x => ({ color: x.cat.colorHex, value: x.value }));
  if (bd.length > 6) segs.push({ color: 'var(--text-3)', value: bd.slice(6).reduce((s, x) => s + x.value, 0) });
  const donut = h(`<div class="card card--pad">
    <div class="section-title" style="margin-bottom:14px">Chi tiêu theo danh mục</div>
    <div class="donut-wrap"></div></div>`);
  const dw = donut.querySelector('.donut-wrap');
  if (t.expense === 0) { dw.appendChild(h('<div class="empty" style="padding:20px 0;width:100%"><div class="empty__title">Chưa có chi tiêu</div></div>')); }
  else {
    const dEl = h(`<div class="donut">${donutSVG(segs, 140)}<div class="donut__center"><small>Tổng chi</small><b>${Money.formatShort(t.expense)}</b></div></div>`);
    dw.appendChild(dEl);
    const legend = h('<div class="legend"></div>');
    bd.slice(0, 6).forEach(x => {
      legend.appendChild(h(`<div class="legend__row"><span class="legend__dot" style="background:${x.cat.colorHex}"></span>
        <span class="legend__name">${x.cat.icon} ${esc(x.cat.name)}</span>
        <span class="legend__val num">${Money.formatShort(x.value)}</span>
        <span class="legend__pct">${Math.round(x.value / t.expense * 100)}%</span></div>`));
    });
    if (bd.length > 6) legend.appendChild(h(`<div class="legend__row"><span class="legend__dot" style="background:var(--text-3)"></span><span class="legend__name">Khác</span><span class="legend__pct">${Math.round(segs[segs.length-1].value / t.expense * 100)}%</span></div>`));
    dw.appendChild(legend);
  }
  grid.appendChild(donut);
  page.appendChild(grid);

  // recent transactions
  const recentWrap = h(`<div class="card card--pad" style="margin-top:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div class="section-title">Giao dịch gần đây</div>
      <button class="btn btn--ghost btn--sm" data-all>Xem tất cả ${I.chevRight}</button>
    </div><div data-recent></div></div>`);
  recentWrap.querySelector('[data-all]').onclick = () => navigate('transactions');
  const rec = recentWrap.querySelector('[data-recent]');
  if (!list.length) rec.appendChild(emptyState('Chưa có giao dịch nào trong kỳ này', 'Nhấn “Thêm giao dịch” để bắt đầu ghi chép.'));
  else list.slice(0, 6).forEach(tx => rec.appendChild(txRow(tx, renderInto)));
  page.appendChild(recentWrap);

  function renderInto() { const parent = page.parentElement; if (parent) { parent.replaceChild(DashboardView(), page); } }
  return page;
}

function kpiCard(label, value, delta, tone, icon, invertDelta) {
  let d = '';
  if (delta !== null && delta !== undefined && isFinite(delta)) {
    const good = invertDelta ? delta <= 0 : delta >= 0;
    d = `<div class="kpi__delta ${good ? 'up' : 'down'}">${delta >= 0 ? I.arrowUp : I.arrowDown} ${Math.abs(delta)}% so với kỳ trước</div>`;
  }
  const valClass = tone === 'income' ? 'text-income' : tone === 'expense' ? 'text-expense' : '';
  const barTone = (tone === 'income' || tone === 'expense') ? tone : 'accent';
  return `<div class="kpi" data-tone="${barTone}"><div class="kpi__label">${icon ? icon : ''}<span>${esc(label)}</span></div>
    <div class="kpi__value num ${valClass}">${value}</div>${d}</div>`;
}

/* -------------------------------------------------- period picker */
function periodPicker(cur, custom, onChange) {
  const presets = [['thisMonth','Tháng này'],['lastMonth','Tháng trước'],['last30','30 ngày qua'],['thisQuarter','Quý này'],['thisYear','Năm nay'],['all','Tất cả']];
  const label = periodRange(cur, custom).label;
  const btn = h(`<button class="btn btn--sm">${I.filter}<span>${esc(label)}</span>${I.chevDown}</button>`);
  const wrap = h('<div class="filter-pop"></div>'); wrap.appendChild(btn);
  attachDropdown(btn, (dd, close) => {
    dd.style.right = '0'; dd.classList.add('dropdown--right'); dd.style.minWidth = '220px';
    presets.forEach(([id, lbl]) => {
      const it = h(`<button class="dropdown__item ${id === cur ? 'is-active' : ''}">${lbl}${id === cur ? I.check : ''}</button>`);
      it.onclick = () => { dashState.period = id; close(); onChange(); };
      dd.appendChild(it);
    });
    dd.appendChild(h('<div class="dropdown__sep"></div>'));
    const cwrap = h(`<div style="padding:6px 8px">
      <div class="dropdown__label" style="padding:2px 2px 6px">Khoảng tùy chỉnh</div>
      <div style="display:flex;gap:6px;align-items:center">
        <input type="date" class="input" value="${custom.start}" data-s style="height:32px">
        <span style="color:var(--text-3)">→</span>
        <input type="date" class="input" value="${custom.end}" data-e style="height:32px">
      </div>
      <button class="btn btn--sm btn--primary" style="width:100%;margin-top:8px" data-apply>Áp dụng</button>
    </div>`);
    cwrap.querySelector('[data-apply]').onclick = () => {
      dashState.custom = { start: cwrap.querySelector('[data-s]').value, end: cwrap.querySelector('[data-e]').value };
      dashState.period = 'custom'; close(); onChange();
    };
    dd.appendChild(cwrap);
  }, { right: true });
  return wrap;
}

/* ---------------------------------------------------- transaction row */
function txRow(tx, refresh) {
  const cats = tx.categoryIds.map(id => Store.category(id)).filter(Boolean);
  const first = cats[0] || Store.pendingCategory();
  const isPending = cats.length === 1 && first.isSystem;
  const tint = first.colorHex;
  const row = h(`<div class="tx">
    <div class="tx__icon" style="background:${tint}22">${first.icon}</div>
    <div class="tx__body">
      <div class="tx__cats">
        <span class="tx__cat">${esc(first.name)}</span>
        ${cats.length > 1 ? `<span class="tx__more">+${cats.length - 1}</span>` : ''}
        ${isPending ? '<span class="badge-pending">Chưa phân loại</span>' : ''}
      </div>
      ${tx.note ? `<div class="tx__note">${esc(tx.note)}</div>` : ''}
    </div>
    <div class="tx__amount ${tx.type === 'income' ? 'text-income' : 'text-expense'}">${Money.signed(tx.amount, tx.type)}</div>
  </div>`);
  row.onclick = () => openTxModal(tx, refresh);
  return row;
}

/* ============================================================ TRANSACTIONS */
const txFilter = { period: 'thisMonth', custom: { start: todayYMD(), end: todayYMD() }, type: 'all', categoryIds: [], rollup: true, search: '', sort: 'date-desc' };

function TransactionsView() {
  const page = h(`<div class="page"></div>`);
  const header = h(`<div class="page__header">
    <div><div class="page__title">Giao dịch</div><div class="page__subtitle" data-sub></div></div>
  </div>`);
  page.appendChild(header);

  // filter bar
  const fb = h('<div class="filterbar"></div>');
  // search
  const search = h(`<div class="search">${I.search}<input class="input" placeholder="Tìm theo ghi chú, danh mục, số tiền…" value="${esc(txFilter.search)}"></div>`);
  let searchTimer;
  search.querySelector('input').oninput = (e) => { clearTimeout(searchTimer); const v = e.target.value; searchTimer = setTimeout(() => { txFilter.search = v; refreshList(); }, 180); };
  fb.appendChild(search);
  // type segmented
  const typeSeg = h(`<div class="segmented">
    <button data-t="all" class="${txFilter.type==='all'?'is-active':''}">Tất cả</button>
    <button data-t="income" data-tone="income" class="${txFilter.type==='income'?'is-active':''}">Thu</button>
    <button data-t="expense" data-tone="expense" class="${txFilter.type==='expense'?'is-active':''}">Chi</button>
  </div>`);
  typeSeg.querySelectorAll('button').forEach(b => b.onclick = () => { txFilter.type = b.dataset.t; renderFull(); });
  fb.appendChild(typeSeg);
  // period
  fb.appendChild(txPeriodPicker(() => renderFull()));
  // category filter (multi-select stays open; just refreshes the list)
  fb.appendChild(categoryFilterPicker(refreshList));
  // sort
  fb.appendChild(sortPicker(() => refreshList()));
  page.appendChild(fb);

  const listWrap = h('<div data-list></div>');
  page.appendChild(listWrap);

  function computeList() { return Domain.filter(txFilter); }
  function refreshList() {
    const list = computeList();
    const t = Domain.totals(list);
    header.querySelector('[data-sub]').textContent = `${t.count} giao dịch · Thu ${Money.formatShort(t.income)} · Chi ${Money.formatShort(t.expense)}`;
    listWrap.innerHTML = '';
    if (!list.length) { listWrap.appendChild(emptyState('Không có giao dịch khớp bộ lọc', 'Thử đổi khoảng thời gian hoặc xóa bớt điều kiện lọc.')); return; }
    // group by date
    const groups = {};
    list.forEach(tx => { (groups[tx.occurredAt] = groups[tx.occurredAt] || []).push(tx); });
    Object.keys(groups).sort((a, b) => txFilter.sort === 'date-asc' ? a.localeCompare(b) : b.localeCompare(a)).forEach(date => {
      const g = groups[date];
      const dayNet = g.reduce((s, x) => s + (x.type === 'income' ? x.amount : -x.amount), 0);
      const gEl = h(`<div class="txgroup"><div class="txgroup__head">
        <span class="txgroup__date">${esc(relativeDateHead(date))}</span>
        <span class="txgroup__sum num">${(dayNet>=0?'+':'')}${Money.format(dayNet)}</span></div></div>`);
      g.forEach(tx => gEl.appendChild(txRow(tx, refreshList)));
      listWrap.appendChild(gEl);
    });
  }
  function renderFull() { const parent = page.parentElement; if (parent) parent.replaceChild(TransactionsView(), page); }
  refreshList();
  return page;
}

function categoryFilterPicker(refreshList) {
  const btn = h(`<button class="chip"><span style="display:inline-flex;align-items:center;gap:6px">${I.tags}<span data-lbl></span></span></button>`);
  function syncBtn() { const n = txFilter.categoryIds.length; btn.classList.toggle('is-active', !!n); btn.querySelector('[data-lbl]').textContent = n ? `${n} danh mục` : 'Danh mục'; }

function sortPicker(onChange) {

/* ------------------------------------------------- transaction modal */
function openTxModal(existing, onSaved) {
  const editing = !!existing;
  const draft = existing
    ? { id: existing.id, type: existing.type, amount: existing.amount, occurredAt: existing.occurredAt, note: existing.note, categoryIds: [...existing.categoryIds] }
    : { type: 'expense', amount: 0, occurredAt: todayYMD(), note: '', categoryIds: [] };

  const node = h(`<div class="modal">
    <div class="modal__head">
      <div class="segmented" data-type>
        <button data-t="expense" data-tone="expense" class="${draft.type==='expense'?'is-active':''}">Chi tiền</button>
        <button data-t="income" data-tone="income" class="${draft.type==='income'?'is-active':''}">Thu tiền</button>
      </div>
      <div style="flex:1"></div>
      <button class="icon-btn" data-close>${I.x}</button>
    </div>
    <div class="modal__body">
      <div class="amount-input">
        <input inputmode="numeric" data-amount placeholder="0" value="${draft.amount?Money.grouped(draft.amount):''}">
        <span class="cur">đ</span>
      </div>
      <div class="field">
        <label class="field__label">Danh mục <span style="color:var(--text-3);font-weight:400">· chọn nhiều được</span></label>
        <div data-picker></div>
      </div>
      <div style="display:flex;gap:12px">
        <div class="field" style="flex:1"><label class="field__label">Ngày</label><input type="date" class="input" data-date value="${draft.occurredAt}"></div>
      </div>
      <div class="field"><label class="field__label">Ghi chú</label><textarea class="textarea" data-note placeholder="Không bắt buộc…">${esc(draft.note)}</textarea></div>
    </div>
    <div class="modal__foot">
      ${editing ? '<button class="btn btn--danger" data-delete>'+I.trash+' Xóa</button>' : ''}
      <div class="spacer"></div>
      <button class="btn btn--ghost" data-close>Hủy</button>
      <button class="btn btn--primary" data-save>${editing?'Lưu':'Thêm giao dịch'}</button>
    </div>
  </div>`);

  const m = openModal(node, { onClose: () => {} });
  node.querySelectorAll('[data-close]').forEach(b => b.onclick = () => m.close());

  // type toggle
  node.querySelectorAll('[data-type] button').forEach(b => b.onclick = () => {
    draft.type = b.dataset.t;
    node.querySelectorAll('[data-type] button').forEach(x => x.classList.toggle('is-active', x === b));
  });

  // amount formatting
  const amountEl = node.querySelector('[data-amount]');
  amountEl.oninput = () => { const v = Money.parse(amountEl.value); draft.amount = v; amountEl.value = v ? Money.grouped(v) : ''; };
  if (!editing) setTimeout(() => amountEl.focus(), 50);

  // category picker
  const picker = buildCategoryPicker(draft.categoryIds, (ids) => { draft.categoryIds = ids; });
  node.querySelector('[data-picker]').appendChild(picker);

  node.querySelector('[data-date]').onchange = (e) => draft.occurredAt = e.target.value;
  node.querySelector('[data-note]').oninput = (e) => draft.note = e.target.value;

  node.querySelector('[data-save]').onclick = () => {
    if (!draft.amount || draft.amount <= 0) { toast('Nhập số tiền đã nhé', 'danger'); amountEl.focus(); return; }
    draft.note = node.querySelector('[data-note]').value;
    Store.saveTransaction(draft);
    m.close();
    toast(editing ? 'Đã lưu thay đổi' : 'Đã thêm giao dịch ' + Money.signed(draft.amount, draft.type));
    if (onSaved) onSaved(); else renderApp();
  };
  if (editing) node.querySelector('[data-delete]').onclick = async () => {
    if (await confirmDialog({ title: 'Xóa giao dịch?', message: 'Giao dịch này sẽ bị xóa vĩnh viễn.', confirmText: 'Xóa', danger: true })) {
      Store.deleteTransaction(existing.id); m.close(); toast('Đã xóa giao dịch'); if (onSaved) onSaved(); else renderApp();
    }
  };
  return m;
}

// hierarchical multi-select picker used inside tx modal
function buildCategoryPicker(selectedIds, onChange) {
  const sel = new Set(selectedIds);
  const wrap = h(`<div class="picker">
    <div class="picker__search">${''}<input class="input" placeholder="Tìm danh mục…"></div>
    <div class="picker__list"></div>
  </div>`);
  const selectedWrap = h('<div class="picker__selected"></div>');
  const listEl = wrap.querySelector('.picker__list');
  const searchEl = wrap.querySelector('input');

  function emit() { onChange([...sel]); renderSelected(); }
  function renderList(q) {
    listEl.innerHTML = '';
    const items = Domain.orderedCategories().filter(({ cat }) => !q || cat.name.toLowerCase().includes(q.toLowerCase()));
    if (!items.length) { listEl.appendChild(h('<div style="padding:14px;text-align:center;color:var(--text-3);font-size:13px">Không tìm thấy</div>')); return; }
    items.forEach(({ cat, depth }) => {
      const checked = sel.has(cat.id);
      const line = h(`<div class="checkline"><span class="checkbox ${checked?'is-checked':''}">${I.check}</span>
        <span class="chip__dot" style="background:${cat.colorHex}"></span>
        <span style="padding-left:${(q?0:depth*14)}px;flex:1">${cat.icon} ${esc(cat.name)}${cat.isSystem?' <span style="color:var(--text-3);font-size:12px">(hệ thống)</span>':''}</span></div>`);
      line.onclick = () => { if (sel.has(cat.id)) sel.delete(cat.id); else sel.add(cat.id); renderList(searchEl.value); emit(); };
      listEl.appendChild(line);
    });
  }
  function renderSelected() {
    selectedWrap.innerHTML = '';
    if (!sel.size) { selectedWrap.appendChild(h(`<span style="font-size:12.5px;color:var(--text-3)">Chưa chọn — sẽ tự gán “${PENDING_NAME}”.</span>`)); return; }
    [...sel].map(id => Store.category(id)).filter(Boolean).forEach(cat => {
      const chip = h(`<span class="chip is-active"><span class="chip__dot" style="background:${cat.colorHex}"></span>${cat.icon} ${esc(cat.name)}<span class="chip__x">${I.x}</span></span>`);
      chip.querySelector('.chip__x').onclick = () => { sel.delete(cat.id); renderList(searchEl.value); emit(); };
      selectedWrap.appendChild(chip);
    });
  }
  searchEl.oninput = () => renderList(searchEl.value);
  renderList(''); renderSelected();
  const container = h('<div></div>'); container.appendChild(wrap); container.appendChild(selectedWrap);
  return container;
}

/* ============================================================= CATEGORIES */
function CategoriesView() {
  const page = h(`<div class="page"></div>`);
  const header = h(`<div class="page__header">
    <div><div class="page__title">Danh mục</div><div class="page__subtitle">Phân loại thu chi. Kéo theo cây cha–con, gắn nhiều danh mục cho một giao dịch.</div></div>
    <div class="page__actions"><button class="btn btn--primary btn--sm" data-add>${I.plus} Thêm danh mục</button></div>
  </div>`);
  header.querySelector('[data-add]').onclick = () => openCategoryModal(null, () => rerender());
  page.appendChild(header);

  ['expense', 'income'].forEach(type => {
    const roots = Store.categories().filter(c => c.type === type && !c.parentId).sort((a,b)=> (a.isSystem?1:0)-(b.isSystem?1:0) || byName(a,b));
    if (!roots.length) return;
    const sec = h(`<div style="margin-bottom:24px"><div class="section-title" style="margin-bottom:8px;display:flex;align-items:center;gap:8px"><span class="type-pill-${type} cat-row__type">${type==='expense'?'Chi tiêu':'Thu nhập'}</span></div><div class="card"></div></div>`);
    const card = sec.querySelector('.card');
    const walk = (cat, depth) => {
      card.appendChild(catManageRow(cat, depth, () => rerender()));
      Store.categories().filter(c => c.parentId === cat.id).sort(byName).forEach(ch => walk(ch, depth + 1));
    };
    roots.forEach(r => walk(r, 0));
    page.appendChild(sec);
  });

  function rerender() { const parent = page.parentElement; if (parent) parent.replaceChild(CategoriesView(), page); }
  return page;
}

function catManageRow(cat, depth, refresh) {
  const count = Store.transactions().filter(t => t.categoryIds.includes(cat.id)).length;
  const row = h(`<div class="cat-row" style="padding-left:${10 + depth * 24}px">
    ${depth ? '<span style="color:var(--text-3);margin-right:-4px">'+I.chevRight+'</span>' : ''}
    <span class="cat-row__icon" style="background:${cat.colorHex}22">${cat.icon}</span>
    <span class="cat-row__name">${esc(cat.name)}</span>
    ${cat.isSystem ? '<span class="cat-row__type" style="background:var(--bg-active);color:var(--text-3)">hệ thống</span>' : ''}
    <span style="color:var(--text-3);font-size:12.5px;margin-left:4px">${count} giao dịch</span>
    <span class="cat-row__actions"></span>
  </div>`);
  const actions = row.querySelector('.cat-row__actions');
  if (!cat.isSystem) {
    const edit = h(`<button class="icon-btn" title="Sửa">${I.edit}</button>`); edit.onclick = () => openCategoryModal(cat, refresh);
    const del = h(`<button class="icon-btn" title="Xóa">${I.trash}</button>`);
    del.onclick = async () => {
      const kids = Domain.descendantIds(cat.id).size - 1;
      const msg = `Xóa “${cat.name}”${kids ? ` và ${kids} danh mục con` : ''}? Giao dịch đang gắn sẽ chuyển về “${PENDING_NAME}” nếu không còn danh mục nào.`;
      if (await confirmDialog({ title: 'Xóa danh mục?', message: msg, confirmText: 'Xóa', danger: true })) { Store.deleteCategory(cat.id); toast('Đã xóa danh mục'); refresh(); }
    };
    actions.appendChild(edit); actions.appendChild(del);
  }
  return row;
}

const SWATCHES = ['#e0483d','#d9730d','#cb8a14','#1a8f6b','#0b6e99','#2383e2','#6940a5','#ad1a72','#64473a','#787774'];
const EMOJIS = ['🍜','☕','🍽️','🛒','🛍️','🚕','⛽','🚗','✈️','🏠','💡','🚿','🌐','📱','🏥','🏃','💊','🎬','🎮','🎁','📚','💰','💵','📈','💳','🐶','👕','💇','🎓','⚽','🍺','🎵'];

function openCategoryModal(existing, onSaved) {
  const editing = !!existing;
  const draft = existing ? { ...existing } : { name: '', type: 'expense', icon: '📦', colorHex: '#2383e2', parentId: null };
  const node = h(`<div class="modal modal--lg">
    <div class="modal__head"><div class="modal__title">${editing?'Sửa danh mục':'Thêm danh mục'}</div><button class="icon-btn" data-close>${I.x}</button></div>

        <div class="field" style="flex:1"><label class="field__label">Tên danh mục</label><input class="input" data-name value="${esc(draft.name)}" placeholder="VD: Ăn uống" maxlength="30"></div>

      <div class="field"><label class="field__label">Loại</label>
        <div class="segmented" data-type>
          <button data-t="expense" data-tone="expense" class="${draft.type==='expense'?'is-active':''}">Chi tiêu</button>
          <button data-t="income" data-tone="income" class="${draft.type==='income'?'is-active':''}">Thu nhập</button>
        </div>
      </div>
      <div class="field"><label class="field__label">Danh mục cha <span style="color:var(--text-3);font-weight:400">· để trống nếu là cấp gốc</span></label>
        <select class="select" data-parent></select></div>
      <div class="field"><label class="field__label">Biểu tượng</label><div class="emoji-grid" data-emojis></div></div>
      <div class="field"><label class="field__label">Màu</label><div class="color-swatches" data-colors></div></div>
    </div>
    <div class="modal__foot"><div class="spacer"></div><button class="btn btn--ghost" data-close>Hủy</button><button class="btn btn--primary" data-save>${editing?'Lưu':'Thêm'}</button></div>
  </div>`);
  const m = openModal(node);
  node.querySelectorAll('[data-close]').forEach(b => b.onclick = () => m.close());
  const preview = node.querySelector('[data-preview]');
  const updatePreview = () => { preview.style.background = draft.colorHex + '22'; preview.textContent = draft.icon; };
  updatePreview();

  node.querySelector('[data-name]').oninput = (e) => draft.name = e.target.value;
  node.querySelectorAll('[data-type] button').forEach(b => b.onclick = () => { draft.type = b.dataset.t; node.querySelectorAll('[data-type] button').forEach(x => x.classList.toggle('is-active', x === b)); buildParent(); });

  const parentSel = node.querySelector('[data-parent]');
  function buildParent() {
    parentSel.innerHTML = '<option value="">— Không (cấp gốc) —</option>';
    const banned = editing ? Domain.descendantIds(existing.id) : new Set();
    Domain.orderedCategories(draft.type).forEach(({ cat, depth }) => {
      if (cat.isSystem || banned.has(cat.id)) return;
      const o = document.createElement('option'); o.value = cat.id; o.textContent = ' '.repeat(depth * 2) + cat.icon + ' ' + cat.name;
      if (cat.id === draft.parentId) o.selected = true; parentSel.appendChild(o);
    });
  }
  buildParent();
  parentSel.onchange = (e) => draft.parentId = e.target.value || null;

  const emojiWrap = node.querySelector('[data-emojis]');
  EMOJIS.forEach(em => { const b = h(`<button class="emoji-btn ${em===draft.icon?'is-active':''}">${em}</button>`); b.onclick = () => { draft.icon = em; emojiWrap.querySelectorAll('.emoji-btn').forEach(x => x.classList.toggle('is-active', x.textContent === em)); updatePreview(); }; emojiWrap.appendChild(b); });
  const colorWrap = node.querySelector('[data-colors]');
  SWATCHES.forEach(col => { const b = h(`<button class="swatch ${col===draft.colorHex?'is-active':''}" style="background:${col}"></button>`); b.onclick = () => { draft.colorHex = col; colorWrap.querySelectorAll('.swatch').forEach(x => x.classList.remove('is-active')); b.classList.add('is-active'); updatePreview(); }; colorWrap.appendChild(b); });

  node.querySelector('[data-save]').onclick = () => {
    if (!draft.name.trim()) { toast('Nhập tên danh mục', 'danger'); return; }
    if (editing) Store.updateCategory(existing.id, { name: draft.name.trim(), type: draft.type, icon: draft.icon, colorHex: draft.colorHex, parentId: draft.parentId });
    else Store.addCategory({ name: draft.name.trim(), type: draft.type, icon: draft.icon, colorHex: draft.colorHex, parentId: draft.parentId });
    m.close(); toast(editing ? 'Đã lưu danh mục' : 'Đã thêm danh mục'); onSaved && onSaved();
  };
  return m;
}

  // appearance
  const appearance = settingsGroup('Giao diện');
  const themeRow = settingsRow('Chủ đề', 'Sáng, tối, hoặc theo hệ thống.');
  const seg = h(`<div class="segmented">
    <button data-th="light">Sáng</button><button data-th="dark">Tối</button><button data-th="system">Hệ thống</button></div>`);
  const syncSeg = () => seg.querySelectorAll('button').forEach(b => b.classList.toggle('is-active', b.dataset.th === Store.getTheme()));
  seg.querySelectorAll('button').forEach(b => b.onclick = () => { Store.setTheme(b.dataset.th); syncSeg(); renderApp(); });
  syncSeg();
  themeRow.querySelector('.settings-row__ctrl').appendChild(seg);
  appearance.appendChild(themeRow);
  page.appendChild(appearance);

  // data
  const data = settingsGroup('Dữ liệu');
  const d = Store.data();
  const stat = settingsRow('Dữ liệu của bạn', `${d.transactions.length} giao dịch · ${d.categories.length} danh mục. Lưu cục bộ trên trình duyệt này.`);
  data.appendChild(stat);
  const expRow = settingsRow('Sao lưu & xuất', 'Xuất toàn bộ ra JSON (khôi phục được) hoặc CSV (mở bằng Excel).');
  const expCtrl = expRow.querySelector('.settings-row__ctrl');
  const bj = h(`<button class="btn btn--sm">${I.download} JSON</button>`); bj.onclick = exportJSON;
  const bc = h(`<button class="btn btn--sm">${I.download} CSV</button>`); bc.onclick = exportCSV;
  expCtrl.style.gap = '8px'; expCtrl.appendChild(bj); expCtrl.appendChild(bc);
  data.appendChild(expRow);
  const impRow = settingsRow('Nhập từ tệp', 'Khôi phục từ tệp JSON đã xuất trước đó (ghi đè dữ liệu hiện tại).');
  const bi = h(`<button class="btn btn--sm">${I.upload} Nhập JSON</button>`); bi.onclick = importJSON;
  impRow.querySelector('.settings-row__ctrl').appendChild(bi);
  data.appendChild(impRow);
  page.appendChild(data);

  // danger
  const danger = settingsGroup('Vùng nguy hiểm');
  const delRow = settingsRow('Xóa tài khoản', 'Xóa vĩnh viễn tài khoản này cùng toàn bộ giao dịch & danh mục trên máy.');
  const bd2 = h(`<button class="btn btn--sm btn--danger">${I.trash} Xóa tài khoản</button>`);
  bd2.onclick = async () => {
    if (await confirmDialog({ title: 'Xóa tài khoản?', message: `Toàn bộ dữ liệu của “${u.displayName}” sẽ bị xóa và không thể khôi phục.`, confirmText: 'Xóa vĩnh viễn', danger: true })) {
      Store.deleteUser(u.id); toast('Đã xóa tài khoản'); renderApp();
    }
  };
  delRow.querySelector('.settings-row__ctrl').appendChild(bd2);
  danger.appendChild(delRow);
  page.appendChild(danger);

  page.appendChild(h(`<div style="text-align:center;color:var(--text-3);font-size:12.5px;padding:20px 0">Cashy · bản web v1 (prototype). Offline-first — dữ liệu ở trên máy bạn.</div>`));
  return page;
}
function settingsGroup(title) { const g = h(`<div class="settings-group"><div class="section-title" style="margin-bottom:4px">${esc(title)}</div></div>`); return g; }
function settingsRow(title, desc) {
  return h(`<div class="settings-row"><div class="settings-row__main"><div class="settings-row__title">${esc(title)}</div><div class="settings-row__desc">${esc(desc)}</div></div><div class="settings-row__ctrl" style="display:flex;align-items:center"></div></div>`);
}

/* ------------------------------------------------ export / import */
function download(filename, text, mime) {
  const blob = new Blob([text], { type: mime || 'text/plain;charset=utf-8' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename;
  document.body.appendChild(a); a.click(); setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 100);
}
function exportJSON() {
  const u = Store.activeUser();
  const payload = { app: 'cashy', version: 1, exportedAt: new Date().toISOString(), user: { displayName: u.displayName, currency: u.currency, avatarColor: u.avatarColor }, categories: Store.categories(), transactions: Store.transactions() };
  download(`cashy-${u.displayName}-${todayYMD()}.json`, JSON.stringify(payload, null, 2), 'application/json');
  toast('Đã xuất JSON');
}
function csvCell(v) { const s = String(v ?? ''); return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; }
function exportCSV() {
  const rows = [['id','loai','so_tien','ngay','ghi_chu','danh_muc']];
  Store.transactions().slice().sort((a,b)=>a.occurredAt.localeCompare(b.occurredAt)).forEach(t => {
    const cats = t.categoryIds.map(id => Store.category(id)?.name).filter(Boolean).join('|');
    rows.push([t.id, t.type === 'income' ? 'thu' : 'chi', t.amount, t.occurredAt, t.note || '', cats]);
  });
  const csv = '﻿' + rows.map(r => r.map(csvCell).join(',')).join('\r\n');
  download(`cashy-${Store.activeUser().displayName}-${todayYMD()}.csv`, csv, 'text/csv;charset=utf-8');
  toast('Đã xuất CSV');
}
function importJSON() {
  const input = document.createElement('input'); input.type = 'file'; input.accept = 'application/json,.json';
  input.onchange = () => {
    const file = input.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const data = JSON.parse(reader.result);
        if (!data || !Array.isArray(data.categories) || !Array.isArray(data.transactions)) throw new Error('bad');
        if (await confirmDialog({ title: 'Nhập dữ liệu?', message: `Sẽ thay thế dữ liệu hiện tại bằng tệp sao lưu (${data.transactions.length} giao dịch).`, confirmText: 'Nhập & ghi đè', danger: true })) {
          const d = Store.data(); d.categories = data.categories; d.transactions = data.transactions;
          if (data.user?.displayName) Store.updateUser({ displayName: data.user.displayName });
          Store.persist(); toast('Đã nhập dữ liệu'); renderApp();
        }
      } catch (e) { toast('Tệp không hợp lệ', 'danger'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

/* ---------------------------------------------------- shared empty state */
function emptyState(title, sub) {
  return h(`<div class="empty"><div class="empty__icon">${I.wallet}</div><div class="empty__title">${esc(title)}</div><p>${esc(sub || '')}</p></div>`);
}

/* register views into the shared namespace so the core router can find them */
window.__cashy.OnboardingView = OnboardingView;
window.__cashy.routes = { dashboard: DashboardView, transactions: TransactionsView, categories: CategoriesView, settings: SettingsView };
window.__cashy.openTxModal = openTxModal;
})();
</script>
<script>
"use strict";
/* First render — core + views are wired via window.__cashy. */
window.__cashy.renderApp();
</script>
